<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OTW Dashboard — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8fafc; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="login-form" class="w-full max-w-sm">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-xl font-bold text-gray-900 mb-1">OTW Dashboard</h1>
    <p class="text-sm text-gray-500 mb-6">Enter your password to view the pipeline</p>

    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg">
      Invalid password
    </div>

    <button id="biometric-btn" class="hidden w-full py-2.5 mb-4 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-500 transition flex items-center justify-center gap-2"
            onclick="biometricUnlock()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11h0M12 7c-2.21 0-4 1.79-4 4v1a4 4 0 0 0 4 4 4 4 0 0 0 4-4v-1c0-2.21-1.79-4-4-4z"/><path d="M5 12V8a7 7 0 0 1 14 0v4"/><path d="M9 17v2M15 17v2M12 17v4"/></svg>
      Unlock with Touch ID
    </button>

    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
    <input id="password" type="password" autocomplete="current-password" autofocus
           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    <button id="login-btn" onclick="doLogin()"
            class="w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition">
      Sign in
    </button>

    <div id="biometric-setup" class="hidden mt-4 p-3 bg-blue-50 rounded-lg">
      <p class="text-xs text-blue-900 mb-2">Save this device for fingerprint / Touch ID unlock?</p>
      <button onclick="enableBiometric()" class="text-xs px-3 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-500">Enable</button>
      <button onclick="document.getElementById('biometric-setup').classList.add('hidden')" class="text-xs px-3 py-1.5 ml-1 text-blue-700 hover:underline">Not now</button>
    </div>
  </div>
  <p class="text-center text-xs text-gray-400 mt-4">PBKDF2 + HMAC-SHA256 &middot; WebAuthn unlock</p>
</div>

const STORAGE_CRED = "otw_credId";
const STORAGE_PW   = "otw_encPw";
const STORAGE_IV   = "otw_iv";

function b64decode(s) {
  return Uint8Array.from(atob(s), c => c.charCodeAt(0));
}
function b64encode(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function decrypt(password) {
  const passphrase = new TextEncoder().encode(password);
  const salt = b64decode(SALT);
  const tag  = b64decode(TAG);
  const ct   = b64decode(CT);

  const keyMaterial = await crypto.subtle.importKey(
    "raw", passphrase, "PBKDF2", false, ["deriveBits"]
  );
  const dk = new Uint8Array(await crypto.subtle.deriveBits(
    { name: "PBKDF2", salt: salt, iterations: 600000, hash: "SHA-256" },
    keyMaterial, 512
  ));
  const encKey = dk.slice(0, 32);
  const macKey = dk.slice(32, 64);

  const hmacKey = await crypto.subtle.importKey(
    "raw", macKey, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]
  );
  const expectedTag = new Uint8Array(
    await crypto.subtle.sign("HMAC", hmacKey, ct)
  );
  if (expectedTag.length !== tag.length) throw new Error("bad tag");
  let ok = 0;
  for (let i = 0; i < tag.length; i++) ok |= expectedTag[i] ^ tag[i];
  if (ok !== 0) throw new Error("bad password");

  const plain = new Uint8Array(ct.length);
  let counter = 0, offset = 0;
  while (offset < ct.length) {
    const ctrBuf = new Uint8Array(encKey.length + 4);
    ctrBuf.set(encKey);
    new DataView(ctrBuf.buffer).setUint32(encKey.length, counter, false);
    const block = new Uint8Array(
      await crypto.subtle.digest("SHA-256", ctrBuf)
    );
    for (let i = 0; i < block.length && offset < ct.length; i++, offset++) {
      plain[offset] = ct[offset] ^ block[i];
    }
    counter++;
  }
  return new TextDecoder().decode(plain);
}

let lastSuccessfulPassword = null;

async function doLogin() {
  const btn = document.getElementById("login-btn");
  const errEl = document.getElementById("error-msg");
  const pass = document.getElementById("password").value;
  if (!pass) return;

  btn.textContent = "Decrypting...";
  btn.disabled = true;
  errEl.classList.add("hidden");

  try {
    const html = await decrypt(pass);
    lastSuccessfulPassword = pass;

    const supportsWebAuthn = window.PublicKeyCredential &&
      await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    const alreadyRegistered = !!localStorage.getItem(STORAGE_CRED);

    if (supportsWebAuthn && !alreadyRegistered) {
      document.getElementById("biometric-setup").classList.remove("hidden");
      btn.textContent = "✓ Logged in";
      // Auto-render dashboard after 3s if user doesn't decide
      setTimeout(() => {
        if (!document.getElementById("biometric-setup").classList.contains("hidden")) {
          renderDashboard(html);
        }
      }, 3000);
    } else {
      renderDashboard(html);
    }
  } catch (e) {
    errEl.classList.remove("hidden");
    btn.textContent = "Sign in";
    btn.disabled = false;
  }
}

function renderDashboard(html) {
  document.open();
  document.write(html);
  document.close();
}

async function enableBiometric() {
  if (!lastSuccessfulPassword) return;
  try {
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp: { name: "OTW Dashboard" },
        user: {
          id: crypto.getRandomValues(new Uint8Array(16)),
          name: "owner",
          displayName: "OTW Dashboard Owner"
        },
        pubKeyCredParams: [
          { alg: -7,   type: "public-key" },  // ES256
          { alg: -257, type: "public-key" }   // RS256
        ],
        authenticatorSelection: {
          authenticatorAttachment: "platform",
          userVerification: "required",
          residentKey: "preferred"
        },
        timeout: 60000
      }
    });
    const credId = b64encode(cred.rawId);

    // Encrypt password with key derived from credentialId
    const keyBytes = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(credId));
    const aesKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encPw = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv: iv },
      aesKey,
      new TextEncoder().encode(lastSuccessfulPassword)
    );

    localStorage.setItem(STORAGE_CRED, credId);
    localStorage.setItem(STORAGE_PW,   b64encode(encPw));
    localStorage.setItem(STORAGE_IV,   b64encode(iv));

    // Now render the dashboard
    const html = await decrypt(lastSuccessfulPassword);
    renderDashboard(html);
  } catch (e) {
    let msg = "Touch ID setup failed: " + (e.message || e.name);
    if (/TLS|certificate|InvalidStateError/i.test(e.message || "")) {
      msg += "\n\nFix: open chrome://net-internals/#hsts, scroll to "
          + "'Delete domain security policies', enter sshrobotics.com → Delete, "
          + "then www.sshrobotics.com → Delete, then hard-refresh this page "
          + "(Cmd+Shift+R). Or try Safari/Firefox/Incognito.";
    }
    alert(msg);
    document.getElementById("biometric-setup").classList.add("hidden");
    if (lastSuccessfulPassword) {
      const html = await decrypt(lastSuccessfulPassword);
      renderDashboard(html);
    }
  }
}

async function biometricUnlock() {
  const credId = localStorage.getItem(STORAGE_CRED);
  if (!credId) return;
  const btn = document.getElementById("biometric-btn");
  const errEl = document.getElementById("error-msg");
  btn.disabled = true;
  errEl.classList.add("hidden");
  try {
    await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        allowCredentials: [{
          id: b64decode(credId),
          type: 'public-key',
          transports: ['internal']
        }],
        userVerification: 'required',
        timeout: 60000
      }
    });
    // Decrypt stored password
    const keyBytes = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(credId));
    const aesKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']);
    const iv = b64decode(localStorage.getItem(STORAGE_IV));
    const encPw = b64decode(localStorage.getItem(STORAGE_PW));
    const passBytes = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, aesKey, encPw);
    const password = new TextDecoder().decode(passBytes);
    const html = await decrypt(password);
    renderDashboard(html);
  } catch (e) {
    errEl.textContent = "Touch ID failed — use password instead";
    errEl.classList.remove("hidden");
    btn.disabled = false;
  }
}

// On page load: if a credential is registered, surface the biometric button
async function init() {
  if (window.PublicKeyCredential &&
      await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable() &&
      localStorage.getItem(STORAGE_CRED)) {
    document.getElementById("biometric-btn").classList.remove("hidden");
  }
}
init();

document.addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
